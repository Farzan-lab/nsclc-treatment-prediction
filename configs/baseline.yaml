# Phase 3 — Baseline models config

defaults:
  - base

models:
  logistic_regression:
    C: [0.01, 0.1, 1.0, 10.0]
    max_iter: 1000
    class_weight: "balanced"

  random_forest:
    n_estimators: [100, 300]
    max_depth: [5, 10, null]
    class_weight: "balanced"

  xgboost:
    n_estimators: [100, 300]
    max_depth: [4, 6]
    learning_rate: [0.05, 0.1]
    scale_pos_weight: 1
